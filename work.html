<link rel="stylesheet" href="assets/styles.css">
<style>
  .placeholder-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .placeholder-word {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(14px, 2.5vw, 28px);
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .placeholder-dots span {
    display: inline-block;
    animation: blink 1.4s infinite;
    opacity: 0;
  }
  .placeholder-dots span:nth-child(2) { animation-delay: 0.2s; }
  .placeholder-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
</style>

  <div class="placeholder-screen">

      <span id="cycling-word">percolating</span><span class="placeholder-dots"><span>.</span><span>.</span><span>.</span></span>
    </p>

  <span class="site-footer-credit">Handcrafted with VS Code, Claude, GitHub &amp; Netlify by yours truly — 2026</span>
</footer>

<script>
  const words = ['percolating', 'marinating', 'fermenting', 'simmering', 'brewing'];
  let i = 0;
  const el = document.getElementById('cycling-word');
  setInterval(() => {
    i = (i + 1) % words.length;
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s ease';
    setTimeout(() => {
      el.textContent = words[i];
      el.style.opacity = '1';
    }, 300);
  }, 2200);
</script>
